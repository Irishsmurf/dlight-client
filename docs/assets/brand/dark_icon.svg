<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="dlight-client">
  <defs>
    <linearGradient id="temp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFD43B"/>
      <stop offset="0.5" stop-color="#FFF1DC"/>
      <stop offset="1"   stop-color="#7CACF8"/>
    </linearGradient>
  </defs>
  <!-- bezel — lightened for dark backgrounds -->
  <rect x="76"  y="76"  width="360" height="200" rx="100" fill="#5B9BD5"/>
  <!-- light panel: Python Yellow → cream → cool blue -->
  <rect x="104" y="104" width="304" height="144" rx="72"  fill="url(#temp)"/>
  <!-- stem -->
  <rect x="242" y="268" width="28"  height="146"          fill="#5B9BD5"/>
  <!-- base -->
  <rect x="156" y="402" width="200" height="32"  rx="16"  fill="#5B9BD5"/>
</svg>
