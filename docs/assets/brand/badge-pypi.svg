<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 28" role="img" aria-label="dLight-client on PyPI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3d4049"/>
      <stop offset="1"   stop-color="#2d3038"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#4B8BBE"/>
      <stop offset="1"   stop-color="#3776AB"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFD43B"/>
      <stop offset="0.5" stop-color="#FFF1DC"/>
      <stop offset="1"   stop-color="#7CACF8"/>
    </linearGradient>
  </defs>
  <rect width="160" height="28" rx="5" fill="url(#bg)"/>
  <rect x="0" y="0" width="54" height="28" rx="5" fill="url(#accent)"/>
  <!-- square corners on the right side of the accent block -->
  <rect x="48" y="0" width="6" height="28" fill="url(#accent)"/>
  <text x="27" y="18" text-anchor="middle"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="11" font-weight="700" fill="#ffffff">PyPI</text>
  <text x="107" y="18" text-anchor="middle"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="11" font-weight="600" fill="#e8eaed">dLight-client</text>
  <!-- bottom gradient stripe -->
  <rect x="0" y="24" width="160" height="4" rx="2" fill="url(#bar)"/>
</svg>
