<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" role="img"
     aria-label="Color temperature range: 2600 K warm to 6000 K cool">
  <defs>
    <linearGradient id="temp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFD43B"/>
      <stop offset="0.5" stop-color="#FFF1DC"/>
      <stop offset="1"   stop-color="#7CACF8"/>
    </linearGradient>
  </defs>

  <!-- gradient bar -->
  <rect x="40" y="34" width="560" height="36" rx="18" fill="url(#temp)"/>

  <!-- tick marks -->
  <line x1="40"  y1="76" x2="40"  y2="86" stroke="#3C4043" stroke-width="2" stroke-linecap="round"/>
  <line x1="180" y1="76" x2="180" y2="86" stroke="#3C4043" stroke-width="2" stroke-linecap="round"/>
  <line x1="320" y1="76" x2="320" y2="86" stroke="#3C4043" stroke-width="2" stroke-linecap="round"/>
  <line x1="460" y1="76" x2="460" y2="86" stroke="#3C4043" stroke-width="2" stroke-linecap="round"/>
  <line x1="600" y1="76" x2="600" y2="86" stroke="#3C4043" stroke-width="2" stroke-linecap="round"/>

  <!-- labels -->
  <text font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" fill="#3C4043">
    <tspan x="40"  y="104" text-anchor="middle">2600 K</tspan>
    <tspan x="180" y="104" text-anchor="middle">3300 K</tspan>
    <tspan x="320" y="104" text-anchor="middle">4000 K</tspan>
    <tspan x="460" y="104" text-anchor="middle">5000 K</tspan>
    <tspan x="600" y="104" text-anchor="middle">6000 K</tspan>
  </text>

  <!-- warm / cool end labels -->
  <text x="40"  y="22" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="600" fill="#3776AB">Warm</text>
  <text x="600" y="22" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="600" fill="#3776AB">Cool</text>
</svg>
