<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" role="img" aria-label="bullet">
  <defs>
    <linearGradient id="temp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFD43B"/>
      <stop offset="0.5" stop-color="#FFF1DC"/>
      <stop offset="1"   stop-color="#7CACF8"/>
    </linearGradient>
  </defs>
  <!-- miniature lamp mark, scaled to 20×20 -->
  <!-- bezel -->
  <rect x="2.5" y="2.5" width="15" height="8"  rx="4"   fill="#3776AB"/>
  <!-- panel -->
  <rect x="3.5" y="3.5" width="13" height="6"  rx="3"   fill="url(#temp)"/>
  <!-- stem -->
  <rect x="9.5" y="10.5" width="1.5" height="5"         fill="#3776AB"/>
  <!-- base -->
  <rect x="6.5" y="15.5" width="7"   height="1.5" rx="0.75" fill="#3776AB"/>
</svg>
