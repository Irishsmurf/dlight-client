<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img"
     aria-label="dLight-client — async Python library for dLight smart lamps">
  <defs>
    <linearGradient id="temp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFD43B"/>
      <stop offset="0.5" stop-color="#FFF1DC"/>
      <stop offset="1"   stop-color="#7CACF8"/>
    </linearGradient>

    <!-- warm glow behind the lamp -->
    <radialGradient id="glowWarm" cx="0.5" cy="0.4" r="0.52" gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#FFF1DC" stop-opacity="0.88"/>
      <stop offset="0.5" stop-color="#FFD43B" stop-opacity="0.22"/>
      <stop offset="1"   stop-color="#7CACF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Python logo teardrop gradient: blue body -->
    <radialGradient id="pyBlue" cx="0.45" cy="0.45" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#4B8BBE"/>
      <stop offset="1"   stop-color="#3776AB"/>
    </radialGradient>

    <!-- Python logo teardrop gradient: yellow body -->
    <radialGradient id="pyYellow" cx="0.55" cy="0.55" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#FFE873"/>
      <stop offset="1"   stop-color="#FFD43B"/>
    </radialGradient>

    <filter id="panelGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- ── Python logo motif (background, ghosted) ─────────────────────── -->
  <!-- Two interlocking teardrops — Python's emblem, large + translucent  -->
  <!-- Blue teardrop (top-left) -->
  <g opacity="0.10" filter="url(#softBlur)">
    <path d="M218,60
             C218,60 152,60 130,90
             C108,120 108,175 130,200
             C152,225 190,232 218,232
             L218,212
             C198,212 168,206 152,188
             C136,170 136,130 152,112
             C168,94 198,88 218,88
             Z"
          fill="url(#pyBlue)"/>
    <!-- blue teardrop head circle -->
    <circle cx="218" cy="146" r="22" fill="url(#pyBlue)"/>
    <!-- connector nub top -->
    <rect x="208" y="60" width="20" height="24" rx="10" fill="url(#pyBlue)"/>

    <!-- Yellow teardrop (bottom-right) -->
    <path d="M462,460
             C462,460 528,460 550,430
             C572,400 572,345 550,320
             C528,295 490,288 462,288
             L462,308
             C482,308 512,314 528,332
             C544,350 544,390 528,408
             C512,426 482,432 462,432
             Z"
          fill="url(#pyYellow)"/>
    <!-- yellow teardrop head circle -->
    <circle cx="462" cy="374" r="22" fill="url(#pyYellow)"/>
    <!-- connector nub bottom -->
    <rect x="452" y="436" width="20" height="24" rx="10" fill="url(#pyYellow)"/>
  </g>

  <!-- ── Ambient scene glow ───────────────────────────────────────────── -->
  <ellipse cx="340" cy="205" rx="290" ry="210" fill="url(#glowWarm)"/>

  <!-- ── Light beams from panel ───────────────────────────────────────── -->
  <g opacity="0.18" stroke-linecap="round">
    <line x1="257" y1="172" x2="128" y2="345" stroke="url(#temp)" stroke-width="20"/>
    <line x1="292" y1="168" x2="212" y2="385" stroke="url(#temp)" stroke-width="13"/>
    <line x1="340" y1="166" x2="340" y2="405" stroke="url(#temp)" stroke-width="11"/>
    <line x1="388" y1="168" x2="468" y2="385" stroke="url(#temp)" stroke-width="13"/>
    <line x1="423" y1="172" x2="552" y2="345" stroke="url(#temp)" stroke-width="20"/>
  </g>

  <!-- ── Lamp mark ─────────────────────────────────────────────────────── -->
  <!-- translate(170,36) scale(0.66) maps 512×512 mark into ~338×338 px   -->
  <g transform="translate(170,36) scale(0.66)">
    <rect x="76"  y="76"  width="360" height="200" rx="100" fill="#3776AB"/>
    <rect x="104" y="104" width="304" height="144" rx="72"  fill="url(#temp)" filter="url(#panelGlow)"/>
    <rect x="242" y="268" width="28"  height="146" fill="#3776AB"/>
    <rect x="156" y="402" width="200" height="32"  rx="16"  fill="#3776AB"/>
  </g>

  <!-- ── Python pip/badge motif below the lamp — subtle, professional ── -->
  <!-- Three rounded-rect "connection nodes" evoke a package dependency graph -->
  <g opacity="0.28">
    <rect x="304" y="408" width="72" height="20" rx="10" fill="#3776AB"/>
    <rect x="252" y="434" width="72" height="20" rx="10" fill="#FFD43B"/>
    <rect x="356" y="434" width="72" height="20" rx="10" fill="#7CACF8"/>
    <!-- connecting lines -->
    <line x1="340" y1="408" x2="288" y2="434" stroke="#3776AB" stroke-width="1.5" opacity="0.6"/>
    <line x1="340" y1="408" x2="392" y2="434" stroke="#3776AB" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
